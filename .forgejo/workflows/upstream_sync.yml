name: Sync upstream commits from systemd/systemd

on:
  schedule:
    - cron: "42 */8 * * *" # Run every 8 hours on the 42nd minute
  workflow_dispatch:
    # Allow manual running

jobs:
  check-upstream:
    runs-on: codeberg-medium

    steps:
      - name: Checkout fork
        uses: https://data.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          set -euo pipefail
          # Get upstream remote from systemd/systemd
          git remote add upstream https://github.com/systemd/systemd.git || git remote set-url upstream https://github.com/systemd/systemd.git
          git fetch upstream

      - name: Detect and sync upstream commits
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          set -euo pipefail

          # Define variables
          BAD=0
          QBRANCH_NAME="upstream_auto-sync_$(date +"%Y-%m-%d_%H%M%S")"
          local_run_id="${FORGEJO_RUN_ID:-${GITHUB_RUN_NUMBER:-unknown}}"
          OUTPUT_FILE="${FORGEJO_OUTPUT:-${GITHUB_OUTPUT:-/tmp/workflow_output}}"

          # Prep git
          git config --local user.name "qc-infra"
          git config --local user.email "bot@codeberg.org"
          # Always start from local main tracking origin/main
          git checkout -B main origin/main

          # Define a list of new commits not in origin/main but present in upstream/main
          NEW="$(git rev-list --count origin/main..upstream/main || echo 0)"
          echo "NEW_COMMITS=$NEW" >> "$OUTPUT_FILE"

          resolve_delete-modify_conflicts() {
            local unresolved
            local path
            # Get paths marked as deleted
            unresolved="$(git status --porcelain | awk '$1 == "DU" || $1 == "UD" {print $2}')"
            # git status --porcelain outputs status as follows:
            # " DU AGENTS.md"
            # " UD AGENTS.md"
            # And also cant error out here
            for path in $unresolved; do
              # Remove any file marked as deleted
              git rm -f -- "$path"
            done
            # Commit changes
            if [ -n "$unresolved" ]; then
              git commit -m "CI script 'sync_upstream' run '$local_run_id' - Auto-resolve delete/modify conflicts per local" \
                -m "Removed file count: $(echo "$DELETED_FILES" | wc -w)" \
                -m "Files:
                $(echo "$DELETED_FILES" | tr ' ' '\n')"
            fi
            # Check if the file conflicts were resolved
            unresolved="$(git status --porcelain | grep -E "^ D" || true)"
            if [ -n "$unresolved" ]; then
              echo "RESOLVER_MESSAGE='Unresolved file paths have not been resolved. Recommend manual pull from upstream.'" | tee -a $OUTPUT_FILE
              return 1
            fi
            echo "RESOLVER_MESSAGE='Deleted files were successfully resolved.'" | tee -a $OUTPUT_FILE
            return 0
          }
          # Parse commit messages and diffs
          if [ "$NEW" -gt 0 ]; then
            COMMITS="$(git rev-list origin/main..upstream/main)"
            for COMMIT in $COMMITS; do
              if git show --format="%H%n%B%n----" "$COMMIT" | grep -qiE '((^|[^[:alnum:]_])([[:alnum:]_]*[_-])?(age|dob|birth|date)([_-][[:alnum:]_]+|[[:alnum:]_]*)([^[:alnum:]_]|$)|ab1043)'; then
                BAD=1
                break
              fi
            done
            # If age verification is suspected in a commit
            if [ "$BAD" -ne 0 ]; then
              echo "MESSAGE='Commits failed agecheck screening, creating issue and pushing to a queue branch'" | tee -a "$OUTPUT_FILE"
              git checkout -B "$QBRANCH_NAME" origin/main
              # Resolve potential conflicts
              resolve_delete-modify_conflicts
              # Commit and push to queue branch
              git merge -X ours --no-ff upstream/main -m "Queue upstream changes for agecheck review"
              git push -u origin "$QBRANCH_NAME"
              # Create issue
              QBRANCH_COMMITID="$(git rev-parse HEAD)"
              curl -sS -X POST \
                -H "Authorization: token $FORGEJO_TOKEN" \
                -H "Content-Type: application/json" \
                -d "$(jq -n --arg c "$QBRANCH_NAME" --arg id "$QBRANCH_COMMITID" --arg rn "$local_run_id" '{
                    title: "Upstream sync: branch \($c) at commit \($id) did not pass agecheck screening",
                    body: "Automated sync of upstream commits into main branch raised concerns.\n\nBranch \($c) contains changes potentially related to age verification and has been queued for manual review.\n\nCI run: \($rn)"
                  }')" "$FORGEJO_API_URL/repos/$FORGEJO_REPOSITORY/issues"
              echo "MESSAGE='Issue created for upstream commits. Branch: $QBRANCH_NAME'" | tee -a "$OUTPUT_FILE"
            else
              echo "MESSAGE='Upstream has $NEW new commits, merging...'" | tee -a "$OUTPUT_FILE"
              git checkout -B main origin/main
              # Resolve potential conflicts
              resolve_delete-modify_conflicts
              # Commit to origin/main
              git merge -X ours upstream/main
              git merge --continue || echo
              git push origin main
              echo "MESSAGE='Successfully synchronized to upstream. Count: $NEW'" | tee -a "$OUTPUT_FILE"
            fi
          else
            echo "MESSAGE='No new upstream commits.'" | tee -a "$OUTPUT_FILE"
          fi
          # Reset git config (remove the set vars)
          git config --local --remove-section user || git config --local --unset-all user.name user.email
