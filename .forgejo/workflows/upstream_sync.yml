name: Sync upstream commits from systemd/systemd

on:
  schedule:
    - cron: "42 */8 * * *"
  workflow_dispatch:

jobs:
  check-upstream:
    runs-on: codeberg-medium

    steps:
      - name: Checkout fork
        uses: https://data.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          set -euo pipefail
          git remote add upstream https://github.com/systemd/systemd.git || git remote set-url upstream https://github.com/systemd/systemd.git
          git fetch upstream

      - name: Detect and sync upstream commits
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          set -euo pipefail

          BAD=0
          QBRANCH_NAME="upstream_auto-sync-$(date +"%Y-%m-%d")"
          local_run_id="${FORGEJO_RUN_ID:-${GITHUB_RUN_NUMBER:-unknown}}"
          OUTPUT_FILE="${FORGEJO_OUTPUT:-${GITHUB_OUTPUT:-/tmp/workflow_output}}"

          git config --local user.name "qc-infra"
          git config --local user.email "bot@codeberg.org"

          # Always start from local main tracking origin/main
          git checkout -B main origin/main

          NEW="$(git rev-list --count origin/main..upstream/main || echo 0)"
          echo "NEW_COMMITS=$NEW" >> "$OUTPUT_FILE"

          resolve_deleted_file_conflicts() {
            local unresolved
            unresolved="$(git diff --name-only --diff-filter=U || true)"

            [ -n "$unresolved" ] || return 0

            echo "Unresolved paths:"
            printf '%s\n' "$unresolved"

            while IFS= read -r path; do
              [ -n "$path" ] || continue

              # If the file does not exist in HEAD, we deleted it locally.
              # Keep it deleted no matter what upstream changed.
              if ! git cat-file -e "HEAD:$path" 2>/dev/null; then
                echo "Keeping deleted file deleted: $path"
                git rm -f -- "$path"
              fi
            done <<< "$unresolved"

            unresolved="$(git diff --name-only --diff-filter=U || true)"
            if [ -n "$unresolved" ]; then
              echo "Still unresolved after auto-resolving deleted-file conflicts:"
              printf '%s\n' "$unresolved"
              return 1
            fi

            return 0
          }

          merge_upstream_with_deleted_files_ignored() {
            local merge_message="$1"

            # no auto commit; lets us fix conflicts first
            if git merge --no-commit --no-ff upstream/main -m "$merge_message"; then
              # Merge succeeded without conflicts
              git commit --no-edit
              return 0
            fi

            echo "Merge reported conflicts, trying to keep fork-deleted files deleted..."
            resolve_deleted_file_conflicts

            # If merge is now fully resolved, create the merge commit.
            git commit -m "$merge_message"
          }

          if [ "$NEW" -gt 0 ]; then
            COMMITS="$(git rev-list origin/main..upstream/main)"
            for COMMIT in $COMMITS; do
              if git show --format="%H%n%B%n----" "$COMMIT" | grep -qiE '((^|[^[:alnum:]_])([[:alnum:]_]*[_-])?(age|dob|birth|date)([_-][[:alnum:]_]+|[[:alnum:]_]*)([^[:alnum:]_]|$)|ab1043)'; then
                BAD=1
                break
              fi
            done

            if [ "$BAD" -ne 0 ]; then
              echo 'MESSAGE=Commits failed agecheck screening, creating issue and pushing to a queue branch' | tee -a "$OUTPUT_FILE"

              git checkout -B "$QBRANCH_NAME" origin/main

              merge_upstream_with_deleted_files_ignored "Queue upstream changes for agecheck review"

              git push -u origin "$QBRANCH_NAME"

              QBRANCH_COMMITID="$(git rev-parse HEAD)"

              curl -sS -X POST \
                -H "Authorization: token $FORGEJO_TOKEN" \
                -H "Content-Type: application/json" \
                -d "$(jq -n \
                  --arg c "$QBRANCH_NAME" \
                  --arg id "$QBRANCH_COMMITID" \
                  --arg rn "$local_run_id" \
                  '{
                    title: "Upstream sync: branch \($c) at commit \($id) did not pass agecheck screening",
                    body: "Automated sync of upstream commits into main branch raised concerns.\n\nBranch \($c) contains changes potentially related to age verification and has been queued for manual review.\n\nCI run: \($rn)"
                  }')" \
                "$FORGEJO_API_URL/repos/$FORGEJO_REPOSITORY/issues"

              echo "MESSAGE=Issue created for upstream commits. Branch: $QBRANCH_NAME" | tee -a "$OUTPUT_FILE"
            else
              echo "MESSAGE=Upstream has $NEW new commits, merging..." | tee -a "$OUTPUT_FILE"

              git checkout -B main origin/main

              merge_upstream_with_deleted_files_ignored "Merge upstream/main into main"

              git push origin main

              echo "MESSAGE=Successfully synchronized to upstream. Count: $NEW" | tee -a "$OUTPUT_FILE"
            fi
          else
            echo "MESSAGE=No new upstream commits." | tee -a "$OUTPUT_FILE"
          fi

          git config --local --remove-section user || true
